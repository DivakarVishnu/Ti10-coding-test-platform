{% extends "base.html" %}
{% block title %}Login — Ti10{% endblock %}
{% block content %}
<div class="auth-wrapper">
<div class="row justify-content-center w-100">
  <div class="col-md-5">
    <div class="card shadow-sm auth-card">
      <div class="card-body">
        <div class="brand-mark mb-1">Ti10</div>
        <p class="text-muted mb-4">{{ settings.exam_title }}</p>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3 text-muted small">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </p>
    <p class="text-center">
      <a href="{{ url_for('admin_login') }}" class="text-muted small">Admin login</a>
    </p>
  </div>
</div>
</div>
{% endblock %}
