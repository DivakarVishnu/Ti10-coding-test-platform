{% extends "base.html" %}
{% block title %}Login — Ti10{% endblock %}
{% block content %}
<div class="auth-wrapper">
<div class="ocean-scene" id="ocean-scene">
  <div class="ocean-moon"></div>
  <div class="ocean-stars" id="ocean-stars"></div>
  <div class="ocean-clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>
  <div class="ocean-birds" id="ocean-birds"></div>

  <div class="lighthouse">
    <svg viewBox="0 0 30 60" xmlns="http://www.w3.org/2000/svg">
      <rect x="12" y="8" width="6" height="42" fill="#d8b4fe"/>
      <path d="M8 8 L22 8 L18 2 L12 2 Z" fill="#e9d5ff"/>
      <rect x="6" y="50" width="18" height="6" fill="#7c3aed"/>
    </svg>
    <div class="lighthouse-beam"></div>
  </div>

  <div class="ship-wake" id="ship-wake"><div class="ship-wake-inner"></div></div>
  <div class="ship-wrap" id="ship-wrap">
    <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hullGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c084fc"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
        <linearGradient id="sailGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f3f0fa"/>
          <stop offset="100%" stop-color="#d8b4fe"/>
        </linearGradient>
      </defs>
      <rect x="48" y="10" width="3" height="46" fill="#e9d5ff"/>
      <path d="M51 14 L51 52 L20 50 Q34 30 51 14 Z" fill="url(#sailGrad)" opacity="0.95"/>
      <path d="M49 22 L49 50 L72 48 Q60 34 49 22 Z" fill="url(#sailGrad)" opacity="0.75"/>
      <path d="M10 56 L90 56 L78 78 Q50 86 22 78 Z" fill="url(#hullGrad)"/>
      <rect x="10" y="52" width="80" height="6" rx="2" fill="#a855f7"/>
    </svg>
  </div>

  <div class="wave-layer wave-3">
    <svg viewBox="0 0 1200 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C150,80 350,0 600,40 C850,80 1050,0 1200,40 L1200,80 L0,80 Z" fill="rgba(124,58,237,0.35)"/>
    </svg>
  </div>
  <div class="wave-layer wave-2">
    <svg viewBox="0 0 1200 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,30 C200,70 400,10 600,35 C800,60 1000,10 1200,30 L1200,80 L0,80 Z" fill="rgba(168,85,247,0.45)"/>
    </svg>
  </div>
  <div class="wave-layer wave-1">
    <svg viewBox="0 0 1200 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,25 C180,55 420,5 600,28 C780,50 1020,5 1200,25 L1200,80 L0,80 Z" fill="rgba(88,28,135,0.85)"/>
    </svg>
  </div>
</div>

<div class="row justify-content-center w-100">
  <div class="col-md-5">
    <div class="card shadow-sm auth-card">
      <div class="card-body">
        <div class="brand-mark mb-1">Ti10</div>
        <p class="text-muted mb-4">{{ settings.exam_title }}</p>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3 text-muted small">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </p>
    <p class="text-center">
      <a href="{{ url_for('admin_login') }}" class="text-muted small">Admin login</a>
    </p>
  </div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const scene = document.getElementById('ocean-scene');
  const ship = document.getElementById('ship-wrap');
  const wake = document.getElementById('ship-wake');
  const starsLayer = document.getElementById('ocean-stars');
  const birdsLayer = document.getElementById('ocean-birds');

  // Scatter twinkling stars
  for (let i = 0; i < 26; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 55 + '%';
    star.style.animationDelay = (Math.random() * 2.6) + 's';
    starsLayer.appendChild(star);
  }

  // Rising bubbles near the ship
  function spawnBubble() {
    const b = document.createElement('div');
    b.className = 'bubble';
    const centerX = scene.clientWidth / 2;
    b.style.left = (centerX + (Math.random() * 60 - 30)) + 'px';
    b.style.animationDuration = (2.5 + Math.random() * 2) + 's';
    scene.appendChild(b);
    setTimeout(() => b.remove(), 4500);
  }
  setInterval(spawnBubble, 500);

  // Occasional seagulls flying across
  function spawnBird() {
    const b = document.createElement('div');
    b.className = 'bird';
    b.style.top = (10 + Math.random() * 20) + '%';
    const duration = 9 + Math.random() * 6;
    b.style.animationDuration = duration + 's, 1.4s';
    birdsLayer.appendChild(b);
    setTimeout(() => b.remove(), duration * 1000 + 200);
  }
  setInterval(spawnBird, 7000);
  setTimeout(spawnBird, 1500);

  // Ship: autonomous gentle sailing drift + mouse parallax, combined every frame.
  // Wake tracks the ship's exact position so it always trails correctly.
  let autoT = Math.random() * 10;
  let mouseOffset = 0;
  function animateShip() {
    autoT += 0.006;
    const autoX = Math.sin(autoT) * 34; // gentle side-to-side sailing range, px
    const totalX = autoX + mouseOffset;
    const x = `calc(-50% + ${totalX}px)`;
    ship.style.transform = `translateX(${x})`;
    wake.style.transform = `translateX(${x})`;
    requestAnimationFrame(animateShip);
  }
  requestAnimationFrame(animateShip);

  scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    const relX = (e.clientX - rect.left) / rect.width - 0.5; // -0.5..0.5
    mouseOffset = relX * 40;
  });
  scene.addEventListener('mouseleave', () => { mouseOffset = 0; });

  // Click ripple
  scene.addEventListener('click', (e) => {
    const rect = scene.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'click-ripple';
    ripple.style.left = (e.clientX - rect.left) + 'px';
    ripple.style.top = (e.clientY - rect.top) + 'px';
    scene.appendChild(ripple);
    setTimeout(() => ripple.remove(), 900);
  });
</script>
{% endblock %}
