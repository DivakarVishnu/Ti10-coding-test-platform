<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ti10 Admin — Students (interactive demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
/* ==========================================================================
   Ti10 — design tokens (unchanged from your style.css)
   ========================================================================== */
:root {
  --bg: #09090f;
  --bg-elevated: #0f0e1a;
  --card-bg: rgba(255, 255, 255, 0.035);
  --card-bg-solid: #131224;
  --card-border: rgba(168, 120, 255, 0.16);
  --card-border-hover: rgba(168, 120, 255, 0.35);
  --accent: #a855f7;
  --accent-2: #7c3aed;
  --accent-soft: rgba(168, 85, 247, 0.14);
  --accent-glow: rgba(168, 85, 247, 0.55);
  --text-primary: #f3f0fa;
  --text-muted: #9c93b5;
  --text-faint: #655d7d;
  --success: #34d399;
  --danger: #f87171;
  --warning: #fbbf24;
  --radius: 16px;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  background: radial-gradient(ellipse 1200px 800px at 20% -10%, rgba(124, 58, 237, 0.16), transparent),
              radial-gradient(ellipse 900px 700px at 100% 10%, rgba(168, 85, 247, 0.10), transparent),
              var(--bg);
  background-attachment: fixed;
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
}
h1,h2,h3,h4,h5,h6 { font-family: var(--font-display); letter-spacing: -0.01em; margin: 0; }
code, pre { font-family: var(--font-mono); }
::selection { background: var(--accent-soft); }

/* site-wide ambient stars/moon — always non-interactive */
.site-bg-scene { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.site-moon {
  position: absolute; top: 6%; right: 8%; width: 70px; height: 70px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f3f0fa, #d8b4fe 60%, transparent 75%);
  box-shadow: 0 0 50px 14px var(--accent-glow), 0 0 110px 40px rgba(168,85,247,0.18);
  opacity: 0.55;
}
.site-star {
  position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
  animation: siteTwinkle 3.2s ease-in-out infinite; opacity: 0.35;
}
@keyframes siteTwinkle { 0%,100% { opacity:.1; transform:scale(1);} 50% { opacity:.6; transform:scale(1.5);} }

/* ---------------------------------- Navbar ---------------------------------- */
.navbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.5rem;
  background: rgba(10, 9, 18, 0.75);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
}
.navbar-brand {
  font-weight: 700; font-size: 1.3rem;
  background: linear-gradient(135deg, #e9d5ff, var(--accent) 60%, var(--accent-2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.navbar-tag { color: var(--text-muted); font-size: 0.85rem; }

/* ---------------------------------- Layout ---------------------------------- */
.container { max-width: 1160px; margin: 0 auto; padding: 2rem 1.25rem 4rem; position: relative; z-index: 1; }
.page-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .75rem; margin-bottom: 1.5rem; }

/* ---------------------------------- Cards ---------------------------------- */
.card {
  background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  transition: border-color .2s ease;
}
.card:hover { border-color: var(--card-border-hover); }
.card-body { padding: 1.25rem 1.4rem; }

/* ---------------------------------- Buttons ---------------------------------- */
.btn {
  border-radius: 10px; font-weight: 600; font-size: .85rem; padding: 0.5rem 1.05rem;
  border: none; cursor: pointer; transition: all .15s ease; font-family: var(--font-body);
  display: inline-flex; align-items: center; gap: .4rem; white-space: nowrap;
  position: relative; overflow: hidden;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 4px 20px rgba(168,85,247,0.25); }
.btn-primary:hover { background: linear-gradient(135deg,#b968f8,#8b4ceb); box-shadow: 0 6px 28px var(--accent-glow); transform: translateY(-1px); }
.btn-success { background: linear-gradient(135deg,#34d399,#10b981); color:#06281c; box-shadow: 0 4px 18px rgba(52,211,153,0.25); }
.btn-success:hover { box-shadow: 0 6px 24px rgba(52,211,153,0.4); transform: translateY(-1px); }
.btn-danger { background: linear-gradient(135deg,#f87171,#dc2626); color:#fff; box-shadow: 0 4px 18px rgba(248,113,113,0.25); }
.btn-danger:hover { box-shadow: 0 6px 24px rgba(248,113,113,.4); transform: translateY(-1px); }
.btn-warning { background: linear-gradient(135deg,#fbbf24,#f59e0b); color:#3a2600; box-shadow: 0 4px 18px rgba(251,191,36,.25); }
.btn-warning:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(251,191,36,.4); }
.btn-info { background: var(--accent-soft); color: #e9d5ff; border: 1px solid rgba(168,85,247,.35); }
.btn-info:hover { background: rgba(168,85,247,.22); border-color: var(--accent); }
.btn-outline { background: transparent; border: 1px solid var(--card-border); color: var(--text-muted); }
.btn-outline:hover { background: rgba(255,255,255,.05); color: var(--text-primary); border-color: var(--card-border-hover); }
.btn-sm { padding: .38rem .8rem; font-size: .78rem; }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none !important; }

/* ripple */
.btn .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,.45); transform: scale(0); animation: rippleAnim .55s ease-out; pointer-events: none; }
@keyframes rippleAnim { to { transform: scale(3); opacity: 0; } }

/* ---------------------------------- Forms ---------------------------------- */
.form-control, .form-select {
  width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--card-border);
  color: var(--text-primary); border-radius: 10px; padding: .55rem .8rem; font-family: var(--font-body);
  font-size: .9rem; transition: all .15s ease;
}
.form-control:focus, .form-select:focus {
  outline: none; background: rgba(255,255,255,.06); border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.form-control::placeholder { color: var(--text-faint); }
.form-label { display:block; color: var(--text-muted); font-weight: 500; font-size: .8rem; margin-bottom: .35rem; }
.field { margin-bottom: 1rem; }
.hint { color: var(--text-faint); font-size: .75rem; margin-top: .3rem; display:block; }

/* ---------------------------------- Toolbar ---------------------------------- */
.toolbar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-bottom:1.25rem; }
.toolbar .form-select { width: auto; min-width: 150px; }
.toolbar .search-wrap { position: relative; flex: 1; min-width: 220px; }
.toolbar .search-wrap i { position:absolute; left:.75rem; top:50%; transform:translateY(-50%); color:var(--text-faint); }
.toolbar .search-wrap input { padding-left: 2.1rem; }
.result-count { color: var(--text-muted); font-size: .85rem; }

/* ---------------------------------- Table ---------------------------------- */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--card-border); background: var(--card-bg-solid); }
table { width: 100%; border-collapse: collapse; }
thead { color: var(--text-muted); font-family: var(--font-display); font-size: .74rem; text-transform: uppercase; letter-spacing: .05em; }
th, td { padding: .85rem 1rem; text-align: left; border-bottom: 1px solid var(--card-border); vertical-align: middle; }
tbody tr { transition: background .15s ease; }
tbody tr:hover { background: rgba(168,85,247,0.05); }
tbody tr:last-child td { border-bottom: none; }
.mono { font-family: var(--font-mono); font-size: .82rem; color: #d8d3e8; }
.muted-cell { color: var(--text-muted); font-size: .82rem; }

/* badges */
.badge { font-weight: 600; padding: .32em .7em; border-radius: 8px; font-size: .74rem; letter-spacing: .01em; display: inline-flex; align-items:center; gap:.3em; }
.badge.b-success { background: rgba(52,211,153,.18); color: var(--success); border:1px solid rgba(52,211,153,.3); }
.badge.b-warning { background: rgba(251,191,36,.18); color: var(--warning); border:1px solid rgba(251,191,36,.3); }
.badge.b-danger { background: rgba(248,113,113,.18); color: var(--danger); border:1px solid rgba(248,113,113,.3); }
.badge.b-secondary { background: rgba(255,255,255,.08); color: var(--text-muted); }
.dot { width:6px; height:6px; border-radius:50%; background: currentColor; box-shadow: 0 0 6px currentColor; }

.actions { display:flex; gap:.4rem; flex-wrap:wrap; }

/* ---------------------------------- Modal ---------------------------------- */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(5,4,10,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
  opacity: 0; pointer-events: none; transition: opacity .2s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.modal-box {
  width: 100%; max-width: 440px;
  background: var(--card-bg-solid); border: 1px solid var(--card-border-hover); border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(168,85,247,.08);
  transform: scale(0.92) translateY(14px); opacity: 0; transition: transform .25s cubic-bezier(.2,.8,.2,1), opacity .2s ease;
}
.modal-backdrop.open .modal-box { transform: scale(1) translateY(0); opacity: 1; }
.modal-head { display:flex; justify-content:space-between; align-items:center; padding: 1.1rem 1.3rem; border-bottom: 1px solid var(--card-border); }
.modal-head h5 { font-size: 1.05rem; }
.modal-head .sub { color: var(--text-muted); font-size: .8rem; margin-top: .15rem; }
.modal-close { background: transparent; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; line-height: 1; padding: .2rem; border-radius: 6px; transition: all .15s ease; }
.modal-close:hover { color: var(--text-primary); background: rgba(255,255,255,.06); }
.modal-body { padding: 1.3rem; }
.modal-foot { padding: 1rem 1.3rem; border-top: 1px solid var(--card-border); display:flex; justify-content:flex-end; gap:.6rem; }

/* ---------------------------------- Toasts ---------------------------------- */
.toast-stack { position: fixed; top: 1rem; right: 1rem; z-index: 200; display:flex; flex-direction:column; gap:.6rem; }
.toast {
  min-width: 260px; max-width: 340px; padding: .8rem 1rem; border-radius: 12px;
  background: var(--card-bg-solid); border: 1px solid var(--card-border-hover);
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
  display:flex; align-items:flex-start; gap:.6rem; font-size: .86rem;
  transform: translateX(120%); animation: toastIn .35s cubic-bezier(.2,.8,.2,1) forwards, toastOut .35s ease forwards 3.2s;
}
.toast i { margin-top: .1rem; }
.toast.ok { border-color: rgba(52,211,153,.4); }
.toast.ok i { color: var(--success); }
.toast.err { border-color: rgba(248,113,113,.4); }
.toast.err i { color: var(--danger); }
@keyframes toastIn { to { transform: translateX(0); } }
@keyframes toastOut { to { transform: translateX(120%); opacity:0; } }

/* pending pulse ring on avatar-less rows */
.new-pill { position: relative; }
.new-pill::after {
  content:''; position:absolute; inset:-3px; border-radius:8px; border:1px solid var(--warning);
  animation: pendingPulse 1.8s ease-out infinite;
}
@keyframes pendingPulse { 0% { opacity:.6; transform:scale(1);} 100% { opacity:0; transform:scale(1.35);} }

.empty-state { text-align:center; padding: 3rem 1rem; color: var(--text-muted); }
.empty-state i { font-size: 2.2rem; display:block; margin-bottom:.6rem; color: var(--text-faint); }

@media (max-width: 640px) {
  .container { padding: 1.25rem 0.9rem 3rem; }
  th, td { padding: .65rem .6rem; font-size: .82rem; }
}
</style>
</head>
<body>

<div class="site-bg-scene"><div class="site-moon"></div><div class="site-stars" id="siteStars"></div></div>
<div class="toast-stack" id="toastStack"></div>

<nav class="navbar">
  <span class="navbar-brand">Ti10 Admin</span>
  <span class="navbar-tag">Students</span>
</nav>

<div class="container">

  <div class="page-head">
    <h2>Students</h2>
    <span class="badge b-warning"><span class="dot"></span> Pending: <span id="pendingCount">0</span></span>
  </div>

  <div class="toolbar">
    <select id="statusFilter" class="form-select">
      <option value="all">All statuses</option>
      <option value="pending">Pending</option>
      <option value="approved" selected>Approved</option>
      <option value="rejected">Rejected</option>
      <option value="deactivated">Deactivated</option>
    </select>
    <div class="search-wrap">
      <i class="bi bi-search"></i>
      <input id="searchBox" class="form-control" placeholder="Search by name, email, or register no…">
    </div>
    <span class="result-count" id="resultCount"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Name</th><th>Email</th><th>Register No</th><th>Year</th><th>Status</th><th>Joined</th><th style="min-width:220px;">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <i class="bi bi-person-x"></i>
    No students found matching your criteria.
  </div>

</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="editBackdrop">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <h5>Edit student</h5>
        <div class="sub" id="editSub"></div>
      </div>
      <button class="modal-close" data-close>&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="form-label">Register number</label>
        <input class="form-control" id="editRegNo" required>
      </div>
      <div class="field">
        <label class="form-label">Name</label>
        <input class="form-control" id="editName" required>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label class="form-label">Email</label>
        <input class="form-control" id="editEmail" type="email" required>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" data-close>Cancel</button>
      <button class="btn btn-primary" id="saveEditBtn"><i class="bi bi-check2"></i> Save changes</button>
    </div>
  </div>
</div>

<!-- Reset password modal -->
<div class="modal-backdrop" id="resetBackdrop">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <h5>Reset password</h5>
        <div class="sub" id="resetSub"></div>
      </div>
      <button class="modal-close" data-close>&times;</button>
    </div>
    <div class="modal-body">
      <div class="field" style="margin-bottom:.3rem;">
        <label class="form-label">New password (min 6 characters)</label>
        <input class="form-control" id="resetPw" type="text" minlength="6">
      </div>
      <span class="hint">Share this password securely with the student.</span>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" data-close>Cancel</button>
      <button class="btn btn-warning" id="saveResetBtn"><i class="bi bi-key"></i> Reset password</button>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Mock data — same shape as the real Student model (id, name, email,
// register_no, year, status, created_at)
// ---------------------------------------------------------------------------
let students = [
  { id: 1, name: "Ananya Raghunathan", email: "ananya.r@example.edu", register_no: "22CSE014", year: "II CSE B", status: "approved", created_at: "2026-06-02" },
  { id: 2, name: "Karthik Subramaniam", email: "karthik.s@example.edu", register_no: "22CSE027", year: "II CSE B", status: "approved", created_at: "2026-06-03" },
  { id: 3, name: "Divya Manoharan", email: "divya.m@example.edu", register_no: "23CSE009", year: "I CSE A", status: "pending", created_at: "2026-07-10" },
  { id: 4, name: "Rahul Venkatesan", email: "rahul.v@example.edu", register_no: "22CSE041", year: "II CSE A", status: "deactivated", created_at: "2026-05-21" },
  { id: 5, name: "Priya Chandrasekaran", email: "priya.c@example.edu", register_no: "23CSE002", year: "I CSE A", status: "pending", created_at: "2026-07-12" },
  { id: 6, name: "Vignesh Kumaran", email: "vignesh.k@example.edu", register_no: "22CSE008", year: "II CSE B", status: "rejected", created_at: "2026-06-28" },
];

const tableBody = document.getElementById('tableBody');
const emptyState = document.getElementById('emptyState');
const resultCount = document.getElementById('resultCount');
const pendingCount = document.getElementById('pendingCount');
const statusFilter = document.getElementById('statusFilter');
const searchBox = document.getElementById('searchBox');

function statusBadge(status) {
  const map = {
    approved: ['b-success', 'check-circle'],
    pending: ['b-warning', 'hourglass-split'],
    rejected: ['b-danger', 'x-circle'],
    deactivated: ['b-secondary', 'slash-circle'],
  };
  const [cls, icon] = map[status] || ['b-secondary', 'question'];
  return `<span class="badge ${cls}"><i class="bi bi-${icon}"></i>${status}</span>`;
}

function actionButtons(s) {
  let html = '<div class="actions">';
  if (s.status === 'pending') {
    html += `<button class="btn btn-success btn-sm" onclick="approve(${s.id})"><i class="bi bi-check-lg"></i>Approve</button>`;
    html += `<button class="btn btn-danger btn-sm" onclick="reject(${s.id})"><i class="bi bi-x-lg"></i>Reject</button>`;
  } else if (s.status === 'approved') {
    html += `<button class="btn btn-warning btn-sm" onclick="deactivate(${s.id})"><i class="bi bi-pause-circle"></i>Deactivate</button>`;
  } else if (s.status === 'deactivated') {
    html += `<button class="btn btn-success btn-sm" onclick="reactivate(${s.id})"><i class="bi bi-play-circle"></i>Reactivate</button>`;
  }
  html += `<button class="btn btn-info btn-sm" onclick="openEdit(${s.id})"><i class="bi bi-pencil"></i>Edit</button>`;
  html += `<button class="btn btn-outline btn-sm" onclick="openReset(${s.id})"><i class="bi bi-key"></i>Reset PW</button>`;
  html += '</div>';
  return html;
}

function render() {
  const status = statusFilter.value;
  const q = searchBox.value.trim().toLowerCase();
  let rows = students.filter(s => status === 'all' || s.status === status);
  if (q) {
    rows = rows.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.email.toLowerCase().includes(q) ||
      s.register_no.toLowerCase().includes(q)
    );
  }
  pendingCount.textContent = students.filter(s => s.status === 'pending').length;
  resultCount.textContent = `${rows.length} student(s) found`;

  if (!rows.length) {
    tableBody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  tableBody.innerHTML = rows.map(s => `
    <tr>
      <td class="muted-cell">${s.id}</td>
      <td><strong>${s.name}</strong></td>
      <td class="muted-cell">${s.email}</td>
      <td class="mono">${s.register_no}</td>
      <td class="muted-cell">${s.year || 'Not set'}</td>
      <td>${statusBadge(s.status)}</td>
      <td class="muted-cell">${s.created_at}</td>
      <td>${actionButtons(s)}</td>
    </tr>
  `).join('');
}

statusFilter.addEventListener('change', render);
searchBox.addEventListener('input', render);

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------
function find(id) { return students.find(s => s.id === id); }

function approve(id) { find(id).status = 'approved'; toast('ok', `${find(id).name} approved.`); render(); }
function reject(id) { find(id).status = 'rejected'; toast('ok', `${find(id).name} rejected.`); render(); }
function deactivate(id) { find(id).status = 'deactivated'; toast('ok', `${find(id).name}'s account has been deactivated.`); render(); }
function reactivate(id) { find(id).status = 'approved'; toast('ok', `${find(id).name}'s account has been reactivated.`); render(); }

// ---- Edit modal ----
let editingId = null;
const editBackdrop = document.getElementById('editBackdrop');
function openEdit(id) {
  const s = find(id);
  editingId = id;
  document.getElementById('editSub').textContent = `${s.name} · ${s.register_no}`;
  document.getElementById('editRegNo').value = s.register_no;
  document.getElementById('editName').value = s.name;
  document.getElementById('editEmail').value = s.email;
  openModal(editBackdrop);
}
document.getElementById('saveEditBtn').addEventListener('click', function () {
  const regNo = document.getElementById('editRegNo').value.trim();
  const name = document.getElementById('editName').value.trim();
  const email = document.getElementById('editEmail').value.trim().toLowerCase();
  if (!regNo || !name || !email) { toast('err', "Name, email and register number can't be empty."); return; }
  const dupeReg = students.find(s => s.register_no === regNo && s.id !== editingId);
  if (dupeReg) { toast('err', 'That register number is already used by another student.'); return; }
  const dupeEmail = students.find(s => s.email === email && s.id !== editingId);
  if (dupeEmail) { toast('err', 'That email is already used by another student.'); return; }
  const s = find(editingId);
  s.register_no = regNo; s.name = name; s.email = email;
  toast('ok', `Updated details for ${s.name}.`);
  closeModal(editBackdrop);
  render();
});

// ---- Reset password modal ----
let resettingId = null;
const resetBackdrop = document.getElementById('resetBackdrop');
function openReset(id) {
  resettingId = id;
  document.getElementById('resetSub').textContent = find(id).name;
  document.getElementById('resetPw').value = '';
  openModal(resetBackdrop);
}
document.getElementById('saveResetBtn').addEventListener('click', function () {
  const pw = document.getElementById('resetPw').value.trim();
  if (pw.length < 6) { toast('err', 'Password must be at least 6 characters.'); return; }
  toast('ok', `Password reset for ${find(resettingId).name}.`);
  closeModal(resetBackdrop);
});

// ---- Generic modal open/close ----
function openModal(el) { el.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeModal(el) { el.classList.remove('open'); document.body.style.overflow = ''; }
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => btn.closest('.modal-backdrop').classList.remove('open'));
});
document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) closeModal(bd); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-backdrop.open').forEach(closeModal);
});

// ---- Button ripple ----
document.addEventListener('click', function (e) {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

// ---- Toasts ----
function toast(kind, msg) {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast ' + (kind === 'ok' ? 'ok' : 'err');
  el.innerHTML = `<i class="bi bi-${kind === 'ok' ? 'check-circle' : 'exclamation-circle'}"></i><span>${msg}</span>`;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

// ---- ambient stars ----
const starsWrap = document.getElementById('siteStars');
for (let i = 0; i < 40; i++) {
  const star = document.createElement('div');
  star.className = 'site-star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.animationDelay = (Math.random() * 3.2) + 's';
  starsWrap.appendChild(star);
}

render();
</script>
